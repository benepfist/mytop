name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-tui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui

      - name: Run unit tests
        run: cargo test --all-targets --all-features

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info --summary-only

      - name: Extract coverage percentage
        id: coverage
        shell: bash
        run: |
          COVERAGE_LINE="$(cargo llvm-cov report --summary-only | grep -E '^TOTAL')"
          COVERAGE_PCT="$(echo "$COVERAGE_LINE" | awk '{print $NF}')"
          echo "percentage=$COVERAGE_PCT" >> "$GITHUB_OUTPUT"
          echo "### Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total line coverage: **$COVERAGE_PCT**" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-lcov
          path: rust-tui/lcov.info
