name: Rust Build & Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release after successful builds"
        required: true
        type: boolean
        default: false
      tag_name:
        description: "Release tag (required when create_release=true, e.g. v0.1.0)"
        required: false
        type: string
      release_name:
        description: "Release title (optional, defaults to tag_name)"
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    defaults:
      run:
        working-directory: rust-tui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui

      - name: Build release binary
        run: cargo build --release

      - name: Upload Linux binary artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: mytop-tui-linux-x86_64
          path: rust-tui/target/release/mytop-tui

      - name: Upload Windows binary artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: mytop-tui-windows-x86_64
          path: rust-tui/target/release/mytop-tui.exe

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "${{ github.event.inputs.tag_name }}" ]; then
              echo "tag_name is required when create_release=true"
              exit 1
            fi
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            RELEASE_NAME="${{ github.event.inputs.release_name }}"
            if [ -z "$RELEASE_NAME" ]; then
              RELEASE_NAME="$TAG_NAME"
            fi
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            RELEASE_NAME="$TAG_NAME"
            PRERELEASE="false"
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          name: ${{ steps.metadata.outputs.release_name }}
          prerelease: ${{ steps.metadata.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/mytop-tui-linux-x86_64/mytop-tui
            artifacts/mytop-tui-windows-x86_64/mytop-tui.exe
