name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to release (for example v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and release binaries
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            goos: linux
            goarch: amd64
            rust_target: x86_64-unknown-linux-gnu
          - runs_on: ubuntu-latest
            goos: linux
            goarch: arm64
            rust_target: aarch64-unknown-linux-gnu
          - runs_on: macos-latest
            goos: darwin
            goarch: amd64
            rust_target: x86_64-apple-darwin
          - runs_on: macos-latest
            goos: darwin
            goarch: arm64
            rust_target: aarch64-apple-darwin
          - runs_on: windows-latest
            goos: windows
            goarch: amd64
            rust_target: x86_64-pc-windows-msvc

    defaults:
      run:
        working-directory: rust-tui

    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: bash
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "RELEASE_TAG is empty"
            exit 1
          fi
          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "RELEASE_TAG must start with 'v' (got: $RELEASE_TAG)"
              exit 1
              ;;
          esac

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui

      - name: Install Linux ARM64 linker
        if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          mkdir -p dist
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi
          BINARY="mytop-tui-${GOOS}-${GOARCH}${EXT}"

          if [ "$RUST_TARGET" = "aarch64-unknown-linux-gnu" ]; then
            CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
            cargo build --release --target "$RUST_TARGET"
          else
            cargo build --release --target "$RUST_TARGET"
          fi

          cp "target/${RUST_TARGET}/release/mytop-tui${EXT}" "dist/${BINARY}"

      - name: Package Unix artifact
        if: matrix.goos != 'windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p release
          artifact="mytop-tui-${GOOS}-${GOARCH}.tar.gz"
          tar -C dist -czf "release/${artifact}" "mytop-tui-${GOOS}-${GOARCH}"

      - name: Package Windows artifact
        if: matrix.goos == 'windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $artifact = "mytop-tui-${env:GOOS}-${env:GOARCH}.zip"
          Compress-Archive -Path "dist/mytop-tui-${env:GOOS}-${env:GOARCH}.exe" -DestinationPath "release/$artifact" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mytop-tui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rust-tui/release/*

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: rust-tui/release/*
          overwrite_files: true
