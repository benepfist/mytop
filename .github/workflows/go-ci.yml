name: Go CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-and-build:
    name: Test and build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Build
        run: go build ./...
